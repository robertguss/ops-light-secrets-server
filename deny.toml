# cargo-deny configuration for ops-light-secrets-server (MIT whole tree).
# Run: cargo deny check

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
yanked = "warn"
# Transitive/unmaintained deps without a safe upgrade path on the pinned stack.
ignore = [
    "RUSTSEC-2026-0173", # proc-macro-error2 via age/i18n-embed-fl
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained; rustls-pki-types migration later
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
