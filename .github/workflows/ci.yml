name: ci

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runner-self-test:
    name: required / runner-self-test
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Prove private capture and sentinel withholding
        run: ./scripts/verify.sh --self-test

  foundation:
    name: required / ${{ matrix.check }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        check:
          - compat-pins
          - compat-capture
          - differential
          - deny
          - fuzz
          - compatibility-doc
          - lock-msrv
          - crypto-vectors
          - fmt
          - clippy
          - test
          - doc
          - msrv-build
          - msrv-test
          - harness-clippy
          - harness-test
          - harness-msrv-test
          - canary-gate
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Run required check through shared runner
        run: ./scripts/verify.sh "${{ matrix.check }}"

  crypto-vectors-cross-architecture:
    name: required / crypto-vectors / ${{ matrix.architecture }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64
            runner: ubuntu-24.04
          - architecture: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Verify frozen crypto vectors on native architecture
        env:
          OLSS_EXPECT_ARCHITECTURE: ${{ matrix.architecture }}
        run: ./scripts/verify.sh crypto-vectors
